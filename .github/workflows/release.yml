name: release
on:
  push:
    tags:
    - '*'
jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    env:
      CARGO: cargo
      TARGET_FLAGS:
      TARGET_DIR: ./target
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build: [linux, linux-arm, macos, macos-arm, win-msvc, win-gnu, win32-msvc, win-msvc-msi]
        include:
        - build: linux
          os: ubuntu-latest
          rust: stable
          target: x86_64-unknown-linux-musl
        - build: linux-arm
          os: ubuntu-latest
          rust: stable
          target: arm-unknown-linux-gnueabihf
        - build: macos
          os: macos-latest
          rust: stable
          target: x86_64-apple-darwin
        - build: macos-arm
          os: macos-latest
          rust: stable
          target: aarch64-apple-darwin
        - build: win-msvc
          os: windows-2019
          rust: stable
          target: x86_64-pc-windows-msvc
        - build: win-msvc-msi
          os: windows-2019
          rust: stable
          target: x86_64-pc-windows-msvc
        - build: win-gnu
          os: windows-2019
          rust: stable-x86_64-gnu
          target: x86_64-pc-windows-gnu
        - build: win32-msvc
          os: windows-2019
          rust: stable
          target: i686-pc-windows-msvc

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install packages (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xz-utils liblz4-tool musl-tools

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        targets: ${{ matrix.target }}

    - name: Use Cross
      if: matrix.build != 'win-msvc-msi'
      run: |
        cargo install --version 0.2.4 cross
        echo "CARGO=cross" >> $GITHUB_ENV
        echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

    - name: Show command used for Cargo
      run: |
        echo "cargo command is: ${{ env.CARGO }}"
        echo "target flag is: ${{ env.TARGET_FLAGS }}"
        echo "target dir is: ${{ env.TARGET_DIR }}"

    - name: Get release version from tag
      shell: bash
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Build release binary
      if: matrix.build != 'win-msvc-msi'
      run: ${{ env.CARGO }} build --verbose --release ${{ env.TARGET_FLAGS }}

    - name: Strip release binary (linux and macos)
      if: matrix.build == 'linux' || matrix.build == 'macos' || matrix.build == 'macos-arm'
      run: strip "target/${{ matrix.target }}/release/tre"

    - name: Strip release binary (arm)
      if: matrix.build == 'linux-arm'
      run: |
        docker run --rm -v \
          "$PWD/target:/target:Z" \
          rustembedded/cross:arm-unknown-linux-gnueabihf \
          arm-linux-gnueabihf-strip \
          /target/arm-unknown-linux-gnueabihf/release/tre

    - name: Build archive
      if: matrix.build != 'win-msvc-msi'
      shell: bash
      run: |
        staging="tre-${{ env.RELEASE_VERSION }}-${{ matrix.target }}"

        if [ "${{ matrix.os }}" = "windows-2019" ]; then
          7z a "$staging.zip" "./target/release/tre.exe"
          echo "ASSET=$staging.zip" >> $GITHUB_ENV
        else
          tar -C "target/${{ matrix.target }}/release" -cf "$staging.tar" tre
          tar -C "manual" -rf "$staging.tar" tre.1
          gzip "$staging.tar"
          echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
        fi

    - name: Install cargo-wix
      if: matrix.build == 'win-msvc-msi'
      run: cargo install --locked cargo-wix

    - name: Build .msi
      if: matrix.build == 'win-msvc-msi'
      shell: bash
      env:
        RUSTFLAGS: '-C target-feature=+crt-static'
      run: |
        staging="tre-${{ env.RELEASE_VERSION }}-${{ matrix.target }}"

        cargo wix init
        cargo wix -v --nocapture -o $staging.msi
        echo "ASSET=$staging.msi" >> $GITHUB_ENV

    - name: Upload release archive
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ASSET }}
